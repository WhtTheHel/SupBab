<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - QR System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md text-center">
        <h2 class="text-2xl font-bold mb-6">Login QR System</h2>
        
        <div class="space-y-4 text-left">
            <input type="email" id="email" placeholder="Email" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
            <input type="password" id="password" placeholder="Password" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
            
            <button id="mainBtn" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold">Masuk / Daftar</button>

            <div class="relative flex py-2 items-center"><div class="flex-grow border-t"></div><span class="mx-4 text-gray-400 text-xs">Atau</span><div class="flex-grow border-t"></div></div>

            <button id="googleBtn" class="w-full bg-white border p-3 rounded-xl font-semibold flex items-center justify-center hover:bg-gray-50">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5 mr-3">
                Masuk dengan Google
            </button>
        </div>
        <p id="debugStatus" class="mt-4 text-xs text-red-500 font-mono"></p>
    </div>

    <script type="module">
        // GUNAKAN TRY-CATCH UNTUK MELACAK ERROR SAAT LOAD
        try {
            const status = document.getElementById('debugStatus');
            status.innerText = "Sistem sedang memuat...";

            import { auth, db } from './firebase-config.js';
            import { 
                signInWithEmailAndPassword, createUserWithEmailAndPassword, 
                GoogleAuthProvider, signInWithRedirect, getRedirectResult 
            } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
            import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

            status.innerText = "Sistem Siap.";

            // CEK HASIL LOGIN GOOGLE (Khusus HP)
            getRedirectResult(auth).then((result) => {
                if (result) handleUserRedirect(result.user);
            }).catch(e => alert("Gagal Redirect: " + e.message));

            async function handleUserRedirect(user) {
                try {
                    const snap = await getDoc(doc(db, "users", user.uid));
                    if (snap.exists()) {
                        window.location.href = snap.data().role === "admin" ? "admin-list.html" : "dashboard.html";
                    } else {
                        await setDoc(doc(db, "users", user.uid), {
                            email: user.email, role: "user", status: "3", tanggal: new Date().toLocaleString()
                        });
                        window.location.href = "dashboard.html";
                    }
                } catch (e) { alert("Error Database: " + e.message); }
            }

            // TOMBOL GOOGLE (Redirect adalah cara terbaik untuk HP)
            document.getElementById('googleBtn').addEventListener('click', () => {
                const provider = new GoogleAuthProvider();
                signInWithRedirect(auth, provider);
            });

            // TOMBOL LOGIN / DAFTAR
            document.getElementById('mainBtn').addEventListener('click', async () => {
                const email = document.getElementById('email').value;
                const pass = document.getElementById('password').value;
                if(!email || !pass) return alert("Isi data!");

                try {
                    // Coba login dulu, kalau gagal otomatis daftar
                    signInWithEmailAndPassword(auth, email, pass)
                        .then(res => handleUserRedirect(res.user))
                        .catch(async (err) => {
                            if(err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential') {
                                const res = await createUserWithEmailAndPassword(auth, email, pass);
                                await setDoc(doc(db, "users", res.user.uid), {
                                    email: email, role: "user", status: "3", tanggal: new Date().toLocaleString()
                                });
                                alert("Akun baru dibuat!");
                                handleUserRedirect(res.user);
                            } else { alert(err.message); }
                        });
                } catch (e) { alert(e.message); }
            });

        } catch (error) {
            document.getElementById('debugStatus').innerText = "Gagal Load JS: " + error.message;
            alert("Terjadi kesalahan sistem: " + error.message);
        }
    </script>
</body>
</html>
